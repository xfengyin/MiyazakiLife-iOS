name: MiyazakiLife
options:
  bundleIdPrefix: com.miyazakilife
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  MiyazakiLife:
    type: application
    platform: iOS
    sources:
      - path: MiyazakiLife
    info:
      path: MiyazakiLife/Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.miyazakilife.app
        INFOPLIST_FILE: MiyazakiLife/Resources/Info.plist
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: "NO"
