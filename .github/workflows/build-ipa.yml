name: Build and Export IPA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Xcode
        run: |
          sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
          sudo xcodebuild -license accept
      
      - name: Create archive
        run: |
          xcodebuild -workspace MiyazakiLife.xcworkspace \
            -scheme MiyazakiLife \
            -configuration Release \
            -archivePath $GITHUB_WORKSPACE/build/MiyazakiLife.xcarchive \
            archive
      
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $GITHUB_WORKSPACE/build/MiyazakiLife.xcarchive \
            -exportOptionsPlist $GITHUB_WORKSPACE/exportOptions.plist \
            -exportPath $GITHUB_WORKSPACE/build/export \
            -allowProvisioningUpdates
      
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiyazakiLife-IPA
          path: $GITHUB_WORKSPACE/build/export/*.ipa
          retention-days: 30
