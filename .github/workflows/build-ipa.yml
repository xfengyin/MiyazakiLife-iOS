name: Build IPA (Unsigned)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select --switch /Applications/Xcode_16.2.app/Contents/Developer || \
          sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build for iOS Simulator (no signing)
        run: |
          xcodebuild build \
            -project MiyazakiLife.xcodeproj \
            -scheme MiyazakiLife \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Build Archive (unsigned)
        run: |
          xcodebuild archive \
            -project MiyazakiLife.xcodeproj \
            -scheme MiyazakiLife \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/MiyazakiLife.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Create unsigned IPA
        run: |
          mkdir -p build/Payload
          if [ -d "build/MiyazakiLife.xcarchive/Products/Applications/MiyazakiLife.app" ]; then
            cp -r "build/MiyazakiLife.xcarchive/Products/Applications/MiyazakiLife.app" build/Payload/
          elif [ -d "build/MiyazakiLife.xcarchive/Products/Applications" ]; then
            APP=$(find build/MiyazakiLife.xcarchive/Products/Applications -name "*.app" -maxdepth 1 | head -1)
            cp -r "$APP" build/Payload/
          fi
          cd build && zip -r MiyazakiLife-unsigned.ipa Payload/
          ls -lh MiyazakiLife-unsigned.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiyazakiLife-unsigned-IPA
          path: build/MiyazakiLife-unsigned.ipa
          retention-days: 30

      - name: Upload Archive
        uses: actions/upload-artifact@v4
        with:
          name: MiyazakiLife-xcarchive
          path: build/MiyazakiLife.xcarchive
          retention-days: 7
