name: Build IPA (Unsigned)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.0.app/Contents/Developer
      
      - name: List available Xcode versions
        run: ls /Applications/ | grep Xcode
      
      - name: Build Archive
        run: |
          xcodebuild -project MiyazakiLife.xcodeproj \
            -scheme MiyazakiLife \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath ${{ github.workspace }}/build/MiyazakiLife.xcarchive \
            clean archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      
      - name: Export IPA (Unsigned)
        run: |
          xcodebuild -exportArchive \
            -archivePath ${{ github.workspace }}/build/MiyazakiLife.xcarchive \
            -exportPath ${{ github.workspace }}/build \
            -exportOptionsPlist ${{ github.workspace }}/ExportOptions.plist \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MiyazakiLife-Unsigned
          path: ${{ github.workspace }}/build/MiyazakiLife.ipa
          retention-days: 30
      
      - name: Upload App
        uses: actions/upload-artifact@v4
        with:
          name: MiyazakiLife-App
          path: ${{ github.workspace }}/build/MiyazakiLife.app
          retention-days: 30
