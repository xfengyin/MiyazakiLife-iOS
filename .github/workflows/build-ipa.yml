name: Build IPA (Unsigned)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_for:
        description: '构建目标'
        required: true
        default: 'iPad'
        type: choice
        options:
          - iPad
          - iPhone
          - All

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select --switch /Applications/Xcode_16.2.app/Contents/Developer || \
          sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Show project structure
        run: |
          echo "项目结构:"
          find . -name "*.swift" -type f | head -20
          echo ""
          echo "项目配置:"
          cat project.yml

      - name: Build for iOS Simulator (no signing)
        run: |
          echo "🔨 开始构建 Simulator 版本..."
          xcodebuild build \
            -project MiyazakiLife.xcodeproj \
            -scheme MiyazakiLife \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=17.0 \
            TARGETED_DEVICE_FAMILY="1,2"
          echo "✅ Simulator 构建完成"

      - name: Build Archive (unsigned)
        run: |
          echo "🔨 开始构建 Archive..."
          xcodebuild archive \
            -project MiyazakiLife.xcodeproj \
            -scheme MiyazakiLife \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/MiyazakiLife.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            IPHONEOS_DEPLOYMENT_TARGET=17.0 \
            TARGETED_DEVICE_FAMILY="1,2"
          echo "✅ Archive 构建完成"

      - name: Create unsigned IPA
        run: |
          echo "📦 开始创建 IPA 文件..."
          mkdir -p build/Payload

          # 复制应用文件
          if [ -d "build/MiyazakiLife.xcarchive/Products/Applications/MiyazakiLife.app" ]; then
            cp -r "build/MiyazakiLife.xcarchive/Products/Applications/MiyazakiLife.app" build/Payload/
            echo "✅ 找到应用文件"
          else
            # 查找应用文件
            APP=$(find build/MiyazakiLife.xcarchive/Products/Applications -name "*.app" -maxdepth 1 | head -1)
            if [ -n "$APP" ]; then
              cp -r "$APP" build/Payload/
              echo "✅ 找到并复制应用文件: $APP"
            else
              echo "❌ 找不到应用文件"
              ls -la build/MiyazakiLife.xcarchive/Products/Applications/
              exit 1
            fi
          fi

          # 创建 IPA
          cd build
          zip -r MiyazakiLife-iPad9.ipa Payload/

          if [ -f MiyazakiLife-iPad9.ipa ]; then
            echo "✅ IPA 文件创建成功"
            ls -lh MiyazakiLife-iPad9.ipa
          else
            echo "❌ IPA 文件创建失败"
            exit 1
          fi

      - name: Verify IPA
        run: |
          echo "🔍 验证 IPA 文件..."
          if [ -f build/MiyazakiLife-iPad9.ipa ]; then
            echo "✅ IPA 文件存在"
            echo "文件大小: $(ls -lh build/MiyazakiLife-iPad9.ipa | awk '{print $5}')"
            echo "文件类型: $(file build/MiyazakiLife-iPad9.ipa)"
          else
            echo "❌ IPA 文件不存在"
            exit 1
          fi

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiyazakiLife-iPad9-unsigned-IPA
          path: build/MiyazakiLife-iPad9.ipa
          retention-days: 30

      - name: Upload Archive
        uses: actions/upload-artifact@v4
        with:
          name: MiyazakiLife-xcarchive
          path: build/MiyazakiLife.xcarchive
          retention-days: 7

      - name: Build Summary
        run: |
          echo ""
          echo "=========================================="
          echo "🎉 构建成功！"
          echo "=========================================="
          echo ""
          echo "📦 IPA 文件下载链接:"
          echo "   在 Artifacts 中下载 'MiyazakiLife-iPad9-unsigned-IPA'"
          echo ""
          echo "📋 支持的设备:"
          echo "   ✅ iPad 9 (10.2-inch)"
          echo "   ✅ iPad 10 (10.9-inch)"
          echo "   ✅ iPad Air / Pro / Mini"
          echo "   ✅ iPhone (所有型号)"
          echo ""
          echo "📱 安装方法:"
          echo "   1. 使用 Finder 将 IPA 拖到 iPad"
          echo "   2. 或使用 Apple Configurator 2"
          echo "   3. 或使用 Xcode 安装"
          echo ""
